<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Photo Album</title>

    <style>
        /* --- GLOBAL RESET --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Helvetica Neue", Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
            line-height: 1.6;
        }

        /* --- HEADER --- */
        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 2px;
        }

        header p {
            margin-top: 10px;
            font-size: 1.1rem;
            color: #666;
        }

        /* --- GALLERY GRID --- */
        .gallery {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            grid-gap: 20px;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 6px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .gallery img:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 40px;
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Photo Album</h1>
        <p>A collection of moments I love</p>
    </header>

    <section class="gallery">
        <!-- Add your images here -->
        <img src="photos/photo1.jpg" alt="">
        <img src="photos/photo2.jpg" alt="">
        <img src="photos/photo3.jpg" alt="">
        <img src="photos/photo4.jpg" alt="">
        <img src="photos/photo5.jpg" alt="">
        <img src="photos/photo6.jpg" alt="">
    </section>

    <footer>
        © 2026 — Made with love
    </footer>

</body>
</html>
